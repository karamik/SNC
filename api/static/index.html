<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Звёздный удвоитель</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Шапка с балансом и профилем -->
        <div class="header">
            <div class="balance-wrapper">
                <span class="balance-label">⭐ Баланс</span>
                <span class="balance-value" id="balance">0</span>
            </div>
            <button class="profile-btn" id="profileBtn" aria-label="Профиль">👤</button>
        </div>

        <!-- Баннер "Звёзды здесь" (скрыт по умолчанию) -->
        <div class="banner" id="banner" style="display: none;">
            <a href="https://t.me/starsobot_bot?start=438850682" target="_blank" class="banner-link">
                ✨ <strong>Звёзды здесь</strong> ✨
            </a>
        </div>

        <!-- Таймер до следующего раунда -->
        <div class="timer-container">
            <svg class="timer-svg" viewBox="0 0 120 120">
                <circle class="timer-bg" cx="60" cy="60" r="54" fill="none" stroke="#2A2F42" stroke-width="8"/>
                <circle class="timer-progress" id="timerProgress" cx="60" cy="60" r="54" fill="none" stroke="#7C4DFF" stroke-width="8" stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="0" transform="rotate(-90 60 60)"/>
            </svg>
            <div class="timer-text" id="timer">00</div>
            <div class="timer-label">до конца раунда</div>
        </div>

        <!-- Кнопки ставок -->
        <div class="bets-section">
            <button class="bet-btn bet-100" data-amount="100">100 ⭐</button>
            <button class="bet-btn bet-1000" data-amount="1000">1000 ⭐</button>
            <button class="bet-btn bet-5000" data-amount="5000">5000 ⭐</button>
        </div>

        <!-- Информация о раунде -->
        <div class="round-info">
            <span class="bets-count">Ставок в раунде: <span id="betsCount">0</span></span>
        </div>

        <!-- Лента последних выигрышей -->
        <div class="last-wins">
            <h3 class="last-wins-title">🔥 Последние выигрыши</h3>
            <ul class="wins-list" id="winsList">
                <li class="win-item loading">Загрузка...</li>
            </ul>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
